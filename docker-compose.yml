services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: biloki-app
    container_name: biloki_app
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    ports:
      - '8000:8000'
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: biloki
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    tty: true
    stdin_open: true

  vite:
    build:
      context: .
      dockerfile: Dockerfile
    image: biloki-vite
    container_name: biloki_vite
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - '5173:5173'
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    environment:
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
    depends_on:
      - app
    tty: true
    stdin_open: true

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: biloki-queue
    container_name: biloki_queue
    command: ["php", "artisan", "queue:listen", "--tries=1"]
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: biloki
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    tty: true
    stdin_open: true

  mysql:
    image: mysql:8.1
    container_name: biloki_mysql
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biloki
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: biloki_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
  vendor:
  node_modules:
